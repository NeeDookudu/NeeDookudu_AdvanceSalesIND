name: India Advance Sales Scraper

on:
  schedule:
    - cron: '0 */1 * * *'  # Runs at minute 0 past every 2nd hour
  workflow_dispatch:       # Keeps the manual trigger button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright cryptography requests

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Backup existing data safely
        run: |
          # COPY old data to a backup folder so we don't lose it if the script crashes.
          # The original 'data' folder stays intact to preserve historical records.
          if [ -d "data" ]; then
            cp -r data data_backup
          else
            mkdir -p data
          fi

      - name: Run Scrapers and Merger
        env:
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: |
          echo "🚀 Running BMS Advance Sales Scraper..."
          python BMS_AdvanceSales_run.py
          
          echo "🚀 Running District Advance Sales Scraper..."
          python DistrictAdvrun.py
          
          echo "🚀 Running Merger..."
          python mergerrun.py

      - name: Restore old data if scrapers failed!
        if: failure()
        run: |
          # If the Python scripts crash, put the old data back so we don't push corrupted data
          if [ -d "data_backup" ]; then
            rm -rf data
            mv data_backup data
            echo "⚠️ Scrapers failed. Restored old data to prevent data loss."
          fi

      - name: Commit and push data
        # This step only runs if the scraper step succeeded.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all modifications and additions (historical files remain untouched)
          git add --all data/
          
          git diff --cached --quiet || git commit -m "Update advance data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
